StylesPath = styles
MinAlertLevel = warning
Vocab = Mintlify

[formats]
mdx = md

[*.mdx]
BasedOnStyles = Vale
Vale.Terms = NO

TokenIgnores = (?m)((?:import|export) .+?$), \
(?<!`)(<\w+ ?.+ ?\/>)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>), \
(<[^>]*>), \
\{[^}]*\}, \
(`[^`]*`)

BlockIgnores = (?sm)^<style>[\s\S]*?<\/style>$, \
(?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})$, \
(?sm)^```[\s\S]*?```$
