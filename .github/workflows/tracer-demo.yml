name: Tracer Demo

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tracer-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install tracer CLI
        run: |
          curl -sSL https://install.tracer.cloud | CLI_BRANCH=dev sh -s user_2zr9qkHIGPAP5K2GYNKMYLKv0F6

      - name: Initialize tracer
        run: |
          sudo tracer init --token ${{ secrets.JWT_TOKEN }}

      - name: Run Tracer Demo
        run: |
          python -m scripts.tracer_demo
